<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto — Luis Akle Estudio</title>
  <meta name="description" content="Contacta a Luis Akle Estudio. ¿Interesado en una obra o tienes alguna pregunta? Escríbenos.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Luis Akle Estudio">
  <meta property="og:title" content="Contacto — Luis Akle Estudio">
  <meta property="og:description" content="¿Interesado en una obra o tienes alguna pregunta? Escríbenos.">
  <meta property="og:url" content="https://dashing-lamington-3086a4.netlify.app/contact">
  <meta property="og:image" content="https://dashing-lamington-3086a4.netlify.app/images/paintings/GESTO_1024x683.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231a1a1a'/%3E%3Ctext x='32' y='44' font-family='Helvetica,Arial,sans-serif' font-size='30' font-weight='700' fill='%23fff' text-anchor='middle'%3ELA%3C/text%3E%3C/svg%3E">
  <script>try{var l=localStorage.getItem("lang")||"es";document.documentElement.lang=l;document.documentElement.setAttribute("data-lang",l);}catch(e){}</script>
  <link rel="stylesheet" href="css/style.css?v=7">
</head>
<body>
  <div id="site-header"></div>

  <main>
    <div class="container">
      <div class="contact-content">
        <h1><span class="lang-es">Contacto</span><span class="lang-en">Get in Touch</span></h1>
        <p>
          <span class="lang-es">¿Interesado en una obra, tienes alguna pregunta o simplemente quieres saludar? Envíanos un mensaje.</span>
          <span class="lang-en">Interested in a painting, have a question, or just want to say hello? Send us a message.</span>
        </p>

        <form name="contact" method="POST" action="/gracias" data-netlify="true" netlify-honeypot="bot-field" class="contact-form">
          <input type="hidden" name="form-name" value="contact">
          <input type="hidden" name="subject" value="Mensaje desde el sitio de Luis Akle Estudio">
          <p class="bot-field">
            <label>No llenar este campo: <input name="bot-field"></label>
          </p>
          <div class="form-field">
            <label for="contact-name"><span class="lang-es">Nombre</span><span class="lang-en">Name</span></label>
            <input type="text" id="contact-name" name="name" required>
          </div>
          <div class="form-field">
            <label for="contact-email"><span class="lang-es">Correo electrónico</span><span class="lang-en">Email</span></label>
            <input type="email" id="contact-email" name="email" required>
          </div>
          <div class="form-field">
            <label for="contact-message"><span class="lang-es">Mensaje</span><span class="lang-en">Message</span></label>
            <textarea id="contact-message" name="message" rows="6" required></textarea>
          </div>
          <button type="submit" class="contact-submit"><span class="lang-es">Enviar Mensaje</span><span class="lang-en">Send Message</span></button>
        </form>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/nav.js?v=7"></script>
  <script src="js/lang.js?v=7"></script>
  <script>
    // Prefill the message when arriving from a painting's "inquire" link
    (function () {
      var painting = new URLSearchParams(location.search).get("painting");
      if (!painting) return;
      var msg = document.getElementById("contact-message");
      if (!msg || msg.value) return;
      msg.value = document.documentElement.lang === "en"
        ? 'Hello, I\'m interested in the painting "' + painting + '". '
        : 'Hola, me interesa la obra "' + painting + '". ';
    })();
  </script>
</body>
</html>
